name: 'Deploy K8s Apps (Native YAML & DevSecOps)'

# ============================================================================
# RUN NAME: Dynamic title for the Actions execution list
# ============================================================================
run-name: "${{ github.event_name == 'workflow_dispatch' && 'Post Review: Full K8s App Deployment' || 'General Review: K8s App Validation' }}"

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/bookinfo/**'
      - 'environments/gcp-env-demo/k8s-manifests/**'
  workflow_dispatch:

# ============================================================================
# GLOBAL ENVIRONMENT VARIABLES
# ============================================================================
env:
  PROJECT_ID: 'developer-sandbox-489120'
  REGION: 'us-central1'
  GAR_REPO: 'bookinfo-repo'
  GKE_CLUSTER: 'demo-cluster'
  GKE_ZONE: 'us-central1'
  WIF_PROVIDER: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
  REGISTRY: 'us-central1-docker.pkg.dev/developer-sandbox-489120/bookinfo-repo'

# ============================================================================
# CONCURRENCY (Auto-cancel previous redundant runs)
# ============================================================================
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

# ============================================================================
# JOBS DEFINITION
# ============================================================================
jobs:
  build-scan-deploy:
    # 👇 DYNAMIC JOB NAME: Clean text for the sidebar
    name: "${{ github.event_name == 'workflow_dispatch' && 'Post Review: Deploy to K8s' || 'General Review: Build & Scan' }}"
    runs-on: 'ubuntu-latest'
    # Must match the environment specified in your GCP Workload Identity principal
    environment: 'production'

    # Required permissions for Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout Repo'
        uses: 'actions/checkout@v4'

      # 1. Authentication (Direct Workload Identity Pool authentication)
      - name: 'Authenticate to Google Cloud'
        id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          create_credentials_file: true
          workload_identity_provider: '${{ env.WIF_PROVIDER }}'
          project_id: '${{ env.PROJECT_ID }}'

      # 2. Setup Google Cloud SDK and Docker Auth
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Docker Auth to GAR'
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # ============================================================================
      # 3. BUILD IMAGES
      # ============================================================================
      - name: 'Build Productpage Image'
        run: docker build -t bookinfo-productpage:${{ github.sha }} src/bookinfo/productpage/

      - name: 'Build Details Image'
        run: docker build -t bookinfo-details:${{ github.sha }} src/bookinfo/details/

      - name: 'Build Reviews Image'
        run: docker build -t bookinfo-reviews:${{ github.sha }} src/bookinfo/reviews/

      - name: 'Build Ratings Image'
        run: docker build -t bookinfo-ratings:${{ github.sha }} src/bookinfo/ratings/

      # ============================================================================
      # 4. SECURITY SCAN (TRIVY)
      # ============================================================================
      - name: 'Run Trivy vulnerability scanner on Productpage'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bookinfo-productpage:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: 'Run Trivy vulnerability scanner on Details'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bookinfo-details:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: 'Run Trivy vulnerability scanner on Reviews'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bookinfo-reviews:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: 'Run Trivy vulnerability scanner on Ratings'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bookinfo-ratings:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # ============================================================================
      # 5. TAG & PUSH IMAGES
      # ============================================================================
      - name: 'Tag & Push Images to GAR'
        run: |
          docker tag bookinfo-productpage:${{ github.sha }} ${{ env.REGISTRY }}/productpage:${{ github.sha }}
          docker tag bookinfo-details:${{ github.sha }} ${{ env.REGISTRY }}/details:${{ github.sha }}
          docker tag bookinfo-reviews:${{ github.sha }} ${{ env.REGISTRY }}/reviews:${{ github.sha }}
          docker tag bookinfo-ratings:${{ github.sha }} ${{ env.REGISTRY }}/ratings:${{ github.sha }}

          docker push ${{ env.REGISTRY }}/productpage:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/details:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/reviews:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/ratings:${{ github.sha }}

      # ============================================================================
      # 6. DEPLOY TO GKE
      # ============================================================================
      - name: 'Get GKE Credentials'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: '${{ env.GKE_CLUSTER }}'
          location: '${{ env.GKE_ZONE }}'

      - name: 'Mutate Manifests with Kustomize'
        working-directory: environments/gcp-env-demo/k8s-manifests
        run: |
          kustomize edit set image productpage-image=${{ env.REGISTRY }}/productpage:${{ github.sha }}
          kustomize edit set image details-image=${{ env.REGISTRY }}/details:${{ github.sha }}
          kustomize edit set image reviews-image=${{ env.REGISTRY }}/reviews:${{ github.sha }}
          kustomize edit set image ratings-image=${{ env.REGISTRY }}/ratings:${{ github.sha }}

      - name: 'Deploy to K8s'
        working-directory: environments/gcp-env-demo/k8s-manifests
        run: kubectl apply -k .
