name: 'Shared K8s App Pipeline'

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
        description: 'The name of the application (e.g., productpage, details)'
      app_dir:
        required: true
        type: string
        description: 'The directory containing the Dockerfile (e.g., src/bookinfo/productpage)'

# ============================================================================
# GLOBAL ENVIRONMENT VARIABLES
# ============================================================================
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # Removes Node.js 20 deprecation warnings
  PROJECT_ID: 'developer-sandbox-489120'
  REGION: 'us-central1'
  GKE_ZONE: 'us-central1'
  WIF_PROVIDER: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
  # GKE_CLUSTER and REGISTRY are now dynamically fetched from Terraform state
  # Declare empty variables to satisfy the IDE linter. 
  # These will be dynamically overwritten by the Terraform step later.
  GKE_CLUSTER: ''
  REGISTRY: ''

# ============================================================================
# JOBS DEFINITION
# ============================================================================
jobs:
  build-scan-deploy:
    name: "Deploy: ${{ inputs.app_name }}"
    runs-on: 'ubuntu-latest'
    environment: 'production'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout Repo'
        uses: 'actions/checkout@v6'

      # 1. Authentication (Direct Workload Identity Pool authentication)
      - name: 'Authenticate to Google Cloud'
        id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          create_credentials_file: true
          workload_identity_provider: '${{ env.WIF_PROVIDER }}'
          project_id: '${{ env.PROJECT_ID }}'

      # 2. Setup Google Cloud SDK and Docker Auth
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
          install_components: 'local-extract'

      - name: 'Docker Auth to GAR'
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # ============================================================================
      # 3. FETCH DYNAMIC INFRASTRUCTURE STATE
      # ============================================================================
      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v4

      - name: 'Fetch Terraform Outputs'
        id: tf_outputs
        working-directory: environments/gcp-env-demo/infrastructure
        run: |
          terraform init
          
          # Extract dynamic values from Terraform State
          TF_CLUSTER_NAME=$(terraform output -raw gke_cluster_name)
          TF_REGISTRY_URL=$(terraform output -raw artifact_registry_url)
          
          echo "Discovered Cluster: $TF_CLUSTER_NAME"
          echo "Discovered Registry: $TF_REGISTRY_URL"
          
          # Inject them into GitHub Actions environment for subsequent steps
          echo "GKE_CLUSTER=$TF_CLUSTER_NAME" >> $GITHUB_ENV
          echo "REGISTRY=$TF_REGISTRY_URL" >> $GITHUB_ENV

      # ============================================================================
      # 4. BUILD IMAGE
      # ============================================================================
      - name: 'Build ${{ inputs.app_name }} Image'
        run: docker build -t ${{ env.REGISTRY }}/${{ inputs.app_name }}:${{ github.sha }} ${{ inputs.app_dir }}/

      # ============================================================================
      # 5. PUSH IMAGE TO ARTIFACT REGISTRY
      # ============================================================================
      - name: 'Push ${{ inputs.app_name }} to GAR'
        run: docker push ${{ env.REGISTRY }}/${{ inputs.app_name }}:${{ github.sha }}

      # ============================================================================
      # 6. SECURITY SCAN (GCP CONTAINER ANALYSIS)
      # ============================================================================
      - name: 'Scan ${{ inputs.app_name }} Image'
        run: |
          echo "Scanning ${{ inputs.app_name }} image..."
          
          # The scan command returns an operation/scan name
          SCAN_NAME=$(gcloud artifacts docker images scan ${{ env.REGISTRY }}/${{ inputs.app_name }}:${{ github.sha }} \
            --location=us \
            --format="value(response.scan)" \
            --quiet)
          
          echo "Checking for CRITICAL vulnerabilities in scan: $SCAN_NAME"
          
          # Extract all severities and count CRITICAL occurrences using grep
          CRITICAL_COUNT=$(gcloud artifacts docker images list-vulnerabilities "$SCAN_NAME" \
            --format="value(vulnerability.effectiveSeverity)" | grep -c "CRITICAL" || true)
          
          # Evaluate the result
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "SECURITY WARNING: Found $CRITICAL_COUNT CRITICAL vulnerabilities."
            echo "BYPASS ACTIVE: Ignoring vulnerability for demo purposes. Proceeding..."
            # exit 1
          else
            echo "Clean scan: 0 CRITICAL vulnerabilities found. Proceeding."
          fi

      # ============================================================================
      # 7. DEPLOY TO GKE
      # ============================================================================
      - name: 'Get GKE Credentials'
        uses: 'google-github-actions/get-gke-credentials@v3'
        with:
          cluster_name: '${{ env.GKE_CLUSTER }}'
          location: '${{ env.GKE_ZONE }}'

      - name: 'Deploy to K8s'
        working-directory: environments/gcp-env-demo/k8s-manifests
        run: |
          # Ensure the Namespace exists first
          kubectl apply -f 00-namespace.yaml

          # 1. Mutate the local kustomization.yaml with the built image
          kustomize edit set image ${{ inputs.app_name }}-image=${{ env.REGISTRY }}/${{ inputs.app_name }}:${{ github.sha }}

          # 2. Build the YAMLs, but ONLY apply resources matching the current app's label.
          # This prevents race conditions where parallel pipelines overwrite each other with dummy images.
          kustomize build . | kubectl apply -l app=${{ inputs.app_name }} -f -