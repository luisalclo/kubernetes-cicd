name: 'NUKE: Plan & Destroy Environments'

# ============================================================================
# RUN NAME: Dynamic title for the Actions execution list
# ============================================================================
run-name: "${{ github.event_name == 'workflow_dispatch' && inputs.run_destroy == true && 'Post Review: Full Infrastructure Destruction' || 'General Review: Destruction Validation Plan' }}"

on:
  workflow_dispatch:
    inputs:
      run_destroy:
        description: 'Run Terraform Destroy? (Check to DELETE all infrastructure)'
        required: true
        type: boolean
        default: false

# ============================================================================
# GLOBAL ENVIRONMENT VARIABLES
# ============================================================================
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # Removes Node.js 20 deprecation warnings

# ============================================================================
# CONCURRENCY (Auto-cancel previous redundant runs)
# ============================================================================
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  terraform-destroy:
    name: "${{ github.event_name == 'workflow_dispatch' && inputs.run_destroy == true && 'Post Review: Apply Destruction' || 'General Review: Validation Plan' }}"
    runs-on: 'ubuntu-latest'
    environment: 'production'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout Repo'
        uses: 'actions/checkout@v4'

      # 1. Authentication (Direct Workload Identity Pool authentication)
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          create_credentials_file: true
          workload_identity_provider: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
          project_id: 'developer-sandbox-489120'

      # 2. Setup Terraform
      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v4

      # 3. Initialize Terraform
      - name: 'Terraform Init'
        working-directory: environments/gcp-env-demo/infrastructure
        run: terraform init

      # 4. Generate Destruction Plan (Always runs to show what will be deleted)
      - name: 'Terraform Plan (Destroy)'
        working-directory: environments/gcp-env-demo/infrastructure
        run: terraform plan -destroy

      # 5. Execute Destruction (Only triggers if the checkbox was marked)
      - name: 'Terraform Destroy'
        if: "${{ github.event_name == 'workflow_dispatch' && inputs.run_destroy == true }}"
        working-directory: environments/gcp-env-demo/infrastructure
        run: terraform destroy -auto-approve

      # 6. Clean up state files in GCS
      - name: 'Set up Cloud SDK'
        if: "${{ github.event_name == 'workflow_dispatch' && inputs.run_destroy == true }}"
        uses: google-github-actions/setup-gcloud@v2

      - name: 'Delete State Files from GCS'
        if: "${{ github.event_name == 'workflow_dispatch' && inputs.run_destroy == true }}"
        run: |
          echo "Cleaning up Terraform state files..."
          gsutil rm gs://gcp-demo-gkefeb2026/terraform/env/gcp-env-demo/infra/default.tfstate || true