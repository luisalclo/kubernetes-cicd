name: "🧨 NUKE: Destroy All Environments"

on:
  workflow_dispatch:
    inputs:
      confirm_destruction:
        description: 'Type "DESTROY" to confirm'
        required: true
        default: 'NO'
      run_destroy:
        description: 'Actually execute DESTROY? (Uncheck for Dry Run/Plan)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  nuke-apps:
    name: "Step 1: K8s Apps (Plan/Destroy)"
    if: github.event.inputs.confirm_destruction == 'DESTROY'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: environments/gcp-env-demo/k8s-apps
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
          service_account: 'github-actions-sa@developer-sandbox-489120.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan Destroy (See what will happen)
        run: terraform plan -destroy

      - name: Terraform Destroy Apps (Execution)
        if: github.event.inputs.run_destroy == 'true'
        run: terraform destroy -auto-approve

  nuke-infra:
    name: "Step 2: Infrastructure (Plan/Destroy)"
    needs: nuke-apps
    if: |
      always() && 
      github.event.inputs.confirm_destruction == 'DESTROY' && 
      (needs.nuke-apps.result == 'success' || github.event.inputs.run_destroy == 'false')
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: environments/gcp-env-demo/infrastructure
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
          service_account: 'github-actions-sa@developer-sandbox-489120.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan Destroy (See what will happen)
        run: terraform plan -destroy

      - name: Terraform Destroy Infra (Execution)
        if: github.event.inputs.run_destroy == 'true'
        run: terraform destroy -auto-approve

  cleanup-states:
    name: "Step 3: Cleanup GCS States"
    needs: nuke-infra
    if: github.event.inputs.run_destroy == 'true' && needs.nuke-infra.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
          service_account: 'github-actions-sa@developer-sandbox-489120.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete State Files from GCS
        run: |
          echo "Cleaning up Terraform state files..."
          gsutil rm gs://gcp-demo-gkefeb2026/env/gcp-env-demo/infrastructure/default.tfstate || true
          gsutil rm gs://gcp-demo-gkefeb2026/env/gcp-env-demo/k8s-apps/default.tfstate || true
