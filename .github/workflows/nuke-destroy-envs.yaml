name: "NUKE: Plan & Destroy Environments"

# ============================================================================
# TRIGGERS: Manual execution with explicit confirmation
# ============================================================================
on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "DESTROY" to confirm infrastructure deletion'
        required: true
        type: string

# ============================================================================
# GLOBAL ENVIRONMENT VARIABLES
# ============================================================================
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # Removes Node.js 20 deprecation warnings

# ============================================================================
# PERMISSIONS: Required for OIDC / Workload Identity Federation
# ============================================================================
permissions:
  contents: read
  id-token: write

jobs:
# ============================================================================
# PHASE 1: PLAN (Dry Run for Infrastructure)
# ============================================================================
  plan-destruction:
    name: "Step 1: Terraform Plan (Dry Run)"
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Direct WIF Authentication (No Service Account)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
          project_id: 'developer-sandbox-489120'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Plan Destroy Infrastructure
        working-directory: environments/gcp-env-demo/infrastructure
        run: |
          terraform init
          terraform plan -destroy

# ============================================================================
# PHASE 2: DESTROY INFRASTRUCTURE & CLEANUP 
# ============================================================================
  destroy-infra:
    name: "Step 2: Destroy Infrastructure & Cleanup"
    needs: plan-destruction
    # This condition ensures the destruction ONLY runs if the exact word is typed
    if: ${{ inputs.confirm_destroy == 'DESTROY' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Direct WIF Authentication
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          create_credentials_file: true
          workload_identity_provider: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
          project_id: 'developer-sandbox-489120'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Destroy Infrastructure
        working-directory: environments/gcp-env-demo/infrastructure
        run: |
          terraform init
          terraform destroy -auto-approve

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete State Files from GCS
        run: |
          echo "Cleaning up Terraform state files..."
          gsutil rm gs://gcp-demo-gkefeb2026/terraform/env/gcp-env-demo/infra/default.tfstate || true