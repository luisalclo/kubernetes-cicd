name: "🧨 NUKE: Plan & Destroy Environments"

# ============================================================================
# TRIGGERS: Manual execution only
# ============================================================================
on:
  workflow_dispatch:

# ============================================================================
# PERMISSIONS: Required for OIDC / Workload Identity Federation
# ============================================================================
permissions:
  contents: read
  id-token: write

jobs:
# ============================================================================
# PHASE 1: PLAN (Dry Run for both Apps and Infrastructure)
# ============================================================================
  plan-destruction:
    name: "🔍 Step 1: Terraform Plan (Dry Run)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
          service_account: 'github-actions-sa@developer-sandbox-489120.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 🔍 Plan Destroy K8s Apps
        working-directory: environments/gcp-env-demo/k8s-apps
        run: |
          terraform init
          terraform plan -destroy

      - name: 🔍 Plan Destroy Infrastructure
        working-directory: environments/gcp-env-demo/infrastructure
        run: |
          terraform init
          terraform plan -destroy

# ============================================================================
# PHASE 2: DESTROY APPS (Requires Manual Approval in GitHub Environments)
# ============================================================================
  destroy-apps:
    name: "🧨 Step 2: Destroy K8s Apps"
    needs: plan-destruction
    runs-on: ubuntu-latest
    # This environment pauses the pipeline and waits for manual approval
    environment: nuke-approval 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
          service_account: 'github-actions-sa@developer-sandbox-489120.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 🧨 Destroy K8s Apps
        working-directory: environments/gcp-env-demo/k8s-apps
        run: |
          terraform init
          terraform destroy -auto-approve

# ============================================================================
# PHASE 3: DESTROY INFRASTRUCTURE & CLEANUP (Runs automatically after Apps)
# ============================================================================
  destroy-infra:
    name: "🧨 Step 3: Destroy Infrastructure & Cleanup"
    needs: destroy-apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
          service_account: 'github-actions-sa@developer-sandbox-489120.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 🧨 Destroy Infrastructure
        working-directory: environments/gcp-env-demo/infrastructure
        run: |
          terraform init
          terraform destroy -auto-approve

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🧹 Delete State Files from GCS
        run: |
          echo "Cleaning up Terraform state files..."
          gsutil rm gs://gcp-demo-gkefeb2026/env/gcp-env-demo/infrastructure/default.tfstate || true
          gsutil rm gs://gcp-demo-gkefeb2026/env/gcp-env-demo/k8s-apps/default.tfstate || true