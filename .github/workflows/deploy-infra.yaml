name: 'Deploy Infra (Terraform)'

# ============================================================================
# RUN NAME: Dynamic title for the Actions execution list
# ============================================================================
run-name: "${{ github.event_name == 'workflow_dispatch' && 'Post Review: Full Infrastructure Deployment' || 'General Review: Infrastructure Validation' }}"

on:
  push:
    branches:
      - 'main'
    # Triggered only when infrastructure or shared modules are modified
    paths:
      - 'environments/gcp-env-demo/infrastructure/**'
      - 'modules/**'
  workflow_dispatch:
    inputs:
      run_apply:
        description: 'Run Terraform Apply? (Check to create/modify infrastructure)'
        required: true
        type: boolean
        default: false

# ============================================================================
# GLOBAL ENVIRONMENT VARIABLES
# ============================================================================
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # Removes Node.js 20 deprecation warnings

# ============================================================================
# CONCURRENCY (Auto-cancel previous redundant runs)
# ============================================================================
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  terraform-deploy:
    # 👇 DYNAMIC JOB NAME: Clean text for the sidebar
    name: "${{ github.event_name == 'workflow_dispatch' && 'Post Review: Apply Changes' || 'General Review: Validation Plan' }}"
    runs-on: 'ubuntu-latest'
    # Must match the environment specified in your GCP Workload Identity principal
    environment: 'production'

    # Required permissions for Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout Repo'
        uses: 'actions/checkout@v6' 

      # 1. Authentication (Direct Workload Identity Pool authentication)
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          create_credentials_file: true
          workload_identity_provider: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
          project_id: 'developer-sandbox-489120'

      # 2. Install Terraform on the GitHub runner
      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v4

      # 3. Initialize Terraform (Networking, GKE, and State Bucket)
      - name: 'Terraform Init'
        working-directory: environments/gcp-env-demo/infrastructure
        run: terraform init

      # 4. Generate Execution Plan (For auditing purposes)
      - name: 'Terraform Plan'
        working-directory: environments/gcp-env-demo/infrastructure
        run: terraform plan

      # 5. Deploy Infrastructure (Only triggers via manual workflow_dispatch with run_apply=true)
      - name: 'Terraform Apply'
        if: "${{ github.event_name == 'workflow_dispatch' && inputs.run_apply == true }}"
        working-directory: environments/gcp-env-demo/infrastructure
        run: terraform apply -auto-approve