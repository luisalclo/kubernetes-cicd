name: 'Deploy Infra (Terraform)'

on:
  push:
    branches:
      - 'main'
    paths:
      - 'environments/gcp-env-demo/infrastructure/**'
      - 'modules/**'
  workflow_dispatch:
    inputs:
      run_apply:
        description: 'Run Terraform Apply? (Check to create/modify infrastructure)'
        required: true
        type: boolean
        default: false

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  terraform-deploy:
    name: 'Terraform Apply Infra'
    runs-on: 'ubuntu-latest'
    # 👇 Nos rendimos ante tu compa: usamos production 👇
    environment: 'production'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout Repo'
        uses: 'actions/checkout@v4' 

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          create_credentials_file: true
          workload_identity_provider: 'projects/697350290405/locations/global/workloadIdentityPools/github-identity-pool/providers/github'
          project_id: 'developer-sandbox-489120'
          # (Aquí NO ponemos service_account porque tu compa usó el principal directo)

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3

      - name: 'Terraform Init'
        working-directory: environments/gcp-env-demo/infrastructure
        run: terraform init

      - name: 'Terraform Plan'
        working-directory: environments/gcp-env-demo/infrastructure
        run: terraform plan

      - name: 'Terraform Apply'
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_apply == true }}
        working-directory: environments/gcp-env-demo/infrastructure
        run: terraform apply -auto-approve