---
apiVersion: v1
kind: Service
metadata:
  name: reviews
  namespace: bookinfo
  labels:
    app: reviews
spec:
  type: ClusterIP
  selector:
    app: reviews
  ports:
    - name: http
      port: 9080
      targetPort: 9080
