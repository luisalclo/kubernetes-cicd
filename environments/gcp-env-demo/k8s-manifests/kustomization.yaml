apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - 00-namespace.yaml
  - 01-productpage.yaml
  - 02-details.yaml
  - 03-reviews.yaml
  - 04-ratings.yaml

images:
  - name: productpage-image
    newName: productpage-image # placeholder, will be replaced by GH Actions
    newTag: latest
  - name: details-image
    newName: details-image # placeholder, will be replaced by GH Actions
    newTag: latest
  - name: reviews-image
    newName: reviews-image # placeholder, will be replaced by GH Actions
    newTag: latest
  - name: ratings-image
    newName: ratings-image # placeholder, will be replaced by GH Actions
    newTag: latest
